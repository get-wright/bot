name: headless-docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install ripgrep (used by grep/glob tools)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install code-review-graph (for integration tests)
        run: |
          python -m pip install --upgrade pip pipx
          pipx install 'code-review-graph>=1.2,<3.0'
          code-review-graph --version

      - name: Install + typecheck + test
        env:
          SAST_USE_GRAPH: "1"
        run: |
          bun install --frozen-lockfile
          bunx tsc --noEmit
          bunx vitest run

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/sast-triage
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (+ push on main/tag)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image size check (PR only, amd64)
        if: github.event_name == 'pull_request'
        run: |
          docker buildx build --load --platform linux/amd64 -t sast-triage:pr .
          size=$(docker image inspect sast-triage:pr --format='{{.Size}}')
          mb=$((size/1024/1024))
          echo "Image size: ${mb}MB"
          [ "$mb" -le 200 ] || { echo "Image exceeds 200MB budget"; exit 1; }
